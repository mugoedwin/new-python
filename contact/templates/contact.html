<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Lux Salon</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f9b0f, #ff7e00);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-container {
            background: #fff;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .contact-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .form-group textarea {
            resize: none;
            height: 120px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ff7e00;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0f9b0f;
        }

        .info {
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="contact-container">
    <h2>Contact Lux Salon</h2>

    <form method="POST" action="{% url 'contact' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea name="message" placeholder="Write your message..." required></textarea>
        </div>

        <button type="submit" class="btn">Send Message</button>
    </form>

    <p class="info">We usually respond within 24 hours 💬</p>
</div>

</body>
</html>
